name: 주식 모니터링 자동화

on:
  schedule:
    - cron: '0 22 * * *'  # ① 한국 시간 매일 아침 7시 정각 실행 (UTC 전날 22:00)
    - cron: '0 7 * * *'   # ② 한국 시간 매일 오후 4시 정각 실행 (UTC 당일 07:00)
  workflow_dispatch:     # 수동으로 즉시 테스트할 수 있는 버튼

jobs:
  run-monitor:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 라이브러리 및 타임존 설치
        run: |
          pip install yfinance pandas requests pytz

      - name: 프로그램 실행
        run: python monitor.py
