name: 종합 투자 모니터링 시스템

on:
  schedule:
    - cron: '0 22 * * *'    # ① 한국 시간 아침 7시 정각
    - cron: '0 7 * * *'     # ② 한국 시간 오후 4시 정각
    - cron: '0 13 * * *'    # ③ 한국 시간 오후 10시 정각
  workflow_dispatch:        # 수동 즉시 실행용 버튼

jobs:
  run-all-tasks:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ★ 중요: 텔레그램 명령어로 와치리스트를 수정하기 위해 필수인 권한
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install yfinance pandas requests pytz

      - name: ⏰ 모니터링 및 텔레그램 명령어 처리 실행
        run: python monitor.py
