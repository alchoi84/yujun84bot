name: 종합 투자 모니터링 시스템

on:
  schedule:
    - cron: '0 22 * * *'    # ① 한국 시간 아침 7시 정각 (주식/크립토 브리핑)
    - cron: '0 7 * * *'     # ② 한국 시간 오후 4시 정각 (국장 마감 브리핑)
    - cron: '0 13 * * *'    # ③ 한국 시간 오후 10시 정각 (미국장 장전 브리핑)
    - cron: '*/10 0-7 * * 1-5' # ④ 평일 오전 9시~오후 4시 사이 10분마다 기상 (국장 장중 테스트용)
  workflow_dispatch:        # 수동 즉시 실행용 버튼

jobs:
  run-all-tasks:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필수 라이브러리 설치
        run: |
          pip install yfinance pandas requests pytz

      - name: ⏰ [주식/RSI/이평선/장중시황] 모니터링 실행
        run: python monitor.py
